<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Murmur agent workflow map preview</title>
  <desc id="desc">A clean operator map showing a generated agent workflow with dynamic fan-out, validation, repair, rank, and report stages.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#efeee8"/>
    </linearGradient>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" fill="none" stroke="#dedbd2" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.3" fill="#c9c6bc"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#171717" flood-opacity=".10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#ec1d35"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#paper)"/>
  <rect x="72" y="140" width="700" height="500" fill="url(#grid)" opacity=".78" stroke="#d2d0c8"/>

  <g transform="translate(36 26)">
    <circle cx="18" cy="18" r="16" fill="none" stroke="#ec1d35" stroke-width="2.4"/>
    <text x="48" y="29" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" letter-spacing="10" fill="#1b1c1d">murmur</text>
    <text x="700" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="700" letter-spacing="2.2" fill="#5d5c57">AGENT OPERATOR MAP - WEBSITE_GENERATE_VALIDATE_REPAIR</text>
    <circle cx="1112" cy="20" r="7" fill="#ec1d35"/>
  </g>

  <line x1="0" y1="76" x2="1200" y2="76" stroke="#d7d4cc"/>
  <text x="36" y="110" font-family="ui-serif, Georgia, serif" font-size="16" font-style="italic" fill="#6a6962">A task becomes a visible, inspectable agent workflow.</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g transform="translate(92 154)">
      <text x="0" y="0" font-size="14" font-weight="700" letter-spacing="1.6" fill="#6e6c66">TASK CONTRACT</text>
      <text x="0" y="32" font-size="18" font-weight="700" fill="#151515">SITE_GENERATE_VALIDATE_REPAIR</text>
      <text x="0" y="58" font-size="13" fill="#5f5d58">Generate a trade simulator, validate in browser, repair failures, report winner.</text>
      <text x="0" y="86" font-size="13" font-weight="700" fill="#5f5d58">14 modules - 17 flows - 31 gates - dynamic agent count</text>
    </g>

    <g stroke="#ec1d35" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M172 286H278"/>
      <path d="M386 286H492"/>
      <path d="M600 286H706"/>
      <path d="M386 382C440 382 440 454 494 454"/>
      <path d="M602 454C658 454 658 382 714 382"/>
      <path d="M822 382H936"/>
    </g>

    <g filter="url(#shadow)">
      <g transform="translate(92 244)">
        <rect width="126" height="84" rx="5" fill="#fffefb" stroke="#d2d0c8"/>
        <circle cx="20" cy="22" r="5" fill="#2f7f3b"/>
        <text x="36" y="26" font-size="12" font-weight="700" fill="#6e6c66">CLASSIFY</text>
        <text x="18" y="54" font-size="13" fill="#171717">acceptance</text>
        <text x="18" y="72" font-size="12" fill="#77746d">0.4s</text>
      </g>
      <g transform="translate(306 244)">
        <rect width="126" height="84" rx="5" fill="#fffefb" stroke="#d2d0c8"/>
        <circle cx="20" cy="22" r="5" fill="#2f7f3b"/>
        <text x="36" y="26" font-size="12" font-weight="700" fill="#6e6c66">GENERATE</text>
        <text x="18" y="54" font-size="13" fill="#171717">fan-out x30</text>
        <text x="18" y="72" font-size="12" fill="#77746d">parallel</text>
      </g>
      <g transform="translate(520 244)">
        <rect width="126" height="84" rx="5" fill="#fffefb" stroke="#d2d0c8"/>
        <circle cx="20" cy="22" r="5" fill="#d06a00"/>
        <text x="36" y="26" font-size="12" font-weight="700" fill="#6e6c66">VERIFY</text>
        <text x="18" y="54" font-size="13" fill="#171717">browser gates</text>
        <text x="18" y="72" font-size="12" fill="#77746d">contract.check</text>
      </g>
      <g transform="translate(734 244)">
        <rect width="126" height="84" rx="5" fill="#fff4f3" stroke="#ec1d35"/>
        <circle cx="20" cy="22" r="5" fill="#ec1d35"/>
        <text x="36" y="26" font-size="12" font-weight="700" fill="#ec1d35">REPAIR</text>
        <text x="18" y="54" font-size="13" fill="#171717">fix missing UI</text>
        <text x="18" y="72" font-size="12" fill="#77746d">retry bounded</text>
      </g>
      <g transform="translate(520 412)">
        <rect width="126" height="84" rx="5" fill="#fffefb" stroke="#d2d0c8"/>
        <circle cx="20" cy="22" r="5" fill="#2f7f3b"/>
        <text x="36" y="26" font-size="12" font-weight="700" fill="#6e6c66">RANK</text>
        <text x="18" y="54" font-size="13" fill="#171717">score winners</text>
        <text x="18" y="72" font-size="12" fill="#77746d">trust score</text>
      </g>
      <g transform="translate(734 340)">
        <rect width="126" height="84" rx="5" fill="#fffefb" stroke="#d2d0c8"/>
        <circle cx="20" cy="22" r="5" fill="#2f7f3b"/>
        <text x="36" y="26" font-size="12" font-weight="700" fill="#6e6c66">REDUCE</text>
        <text x="18" y="54" font-size="13" fill="#171717">merge lanes</text>
        <text x="18" y="72" font-size="12" fill="#77746d">winner only</text>
      </g>
      <g transform="translate(948 340)">
        <rect width="126" height="84" rx="5" fill="#fffefb" stroke="#d2d0c8"/>
        <circle cx="20" cy="22" r="5" fill="#2f7f3b"/>
        <text x="36" y="26" font-size="12" font-weight="700" fill="#6e6c66">REPORT</text>
        <text x="18" y="54" font-size="13" fill="#171717">proof package</text>
        <text x="18" y="72" font-size="12" fill="#77746d">fan + trace</text>
      </g>
    </g>

    <g transform="translate(122 562)">
      <rect width="86" height="24" rx="12" fill="#ec1d35"/>
      <rect x="76" width="86" height="24" rx="12" fill="#b048c7"/>
      <rect x="152" width="86" height="24" rx="12" fill="#634ad9"/>
      <text x="262" y="17" font-size="13" fill="#5f5d58">30 generated trajectories collapse into one accepted artifact.</text>
    </g>

    <g transform="translate(812 140)">
      <rect width="316" height="500" rx="6" fill="#fffefb" stroke="#d2d0c8" filter="url(#shadow)"/>
      <text x="26" y="42" font-size="15" font-weight="700" letter-spacing="1.4" fill="#151515">RUN RESULT</text>
      <text x="26" y="70" font-size="13" fill="#5f5d58">Live run - winner generate_7</text>
      <rect x="26" y="104" width="264" height="34" fill="#f4fff5" stroke="#2f7f3b"/>
      <text x="42" y="126" font-size="12" font-weight="700" fill="#2f7f3b">ACCEPTANCE PASSED</text>
      <text x="26" y="168" font-size="13" font-weight="700" fill="#151515">workflow progress</text>
      <rect x="26" y="186" width="264" height="12" fill="#e8e6df"/>
      <rect x="26" y="186" width="214" height="12" fill="#ec1d35"/>
      <text x="26" y="224" font-size="13" fill="#5f5d58">31 gates evaluated</text>
      <text x="26" y="248" font-size="13" fill="#5f5d58">dynamic agents tracked</text>
      <text x="26" y="290" font-size="13" font-weight="700" fill="#151515">selected artifact</text>
      <rect x="26" y="310" width="264" height="112" fill="#11151b"/>
      <rect x="44" y="330" width="34" height="34" rx="6" fill="#12251b" stroke="#45c77a"/>
      <path d="M54 347L64 357L76 337" fill="none" stroke="#45c77a" stroke-width="4"/>
      <text x="92" y="352" font-size="18" font-weight="700" fill="#ffffff">Murmur</text>
      <rect x="92" y="374" width="150" height="22" rx="11" fill="#253044"/>
      <text x="108" y="390" font-size="11" fill="#c8d1e1">PROOF-BACKED RESULT</text>
      <text x="26" y="464" font-size="12" fill="#77746d">Open Website - site/index.html</text>
    </g>
  </g>
</svg>
